server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Handle Vue Router (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    # MediaMTX WebRTC 스트리밍 프록시 (/stream/ 경로 사용 - Vue Router /live와 충돌 방지)
    location /stream/ {
    # 라즈베리 파이의 Tailscale 가상 IP와 MediaMTX WebRTC 포트(8889) 지정
    proxy_pass http://100.76.180.25:8889/;

    # 2. WebRTC 시그널링(WebSocket)을 위한 필수 프로토콜 업그레이드 설정
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # 3. 요청 헤더 전달 (호스트 및 실제 IP 정보)
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # 4. 스트리밍 끊김 방지를 위한 타임아웃 설정 (24시간)
    proxy_read_timeout 86400;
    proxy_send_timeout 86400;

    # 5. 버퍼링 비활성화 (실시간 스트리밍 지연 방지)
    proxy_buffering off;
    }

    # MediaMTX WHEP 세션 요청 처리 (PATCH/DELETE 등)
    # MediaMTX가 Location 헤더에서 /live/ prefix 없이 /cam1/...으로 리턴함
    location /cam1/ {
    proxy_pass http://100.76.180.25:8889/cam1/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400;
    proxy_send_timeout 86400;
    proxy_buffering off;
    }

    # API proxy - 백엔드로 프록시 (CORS 문제 해결)
    location /api {
        proxy_pass http://autobox-backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
        
    }

    # WebSocket proxy - /ws 및 /ws/ 하위 모든 경로
    location /ws/ {
        proxy_pass http://autobox-backend:8000/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }

    # Static assets caching (only for /assets/ to avoid interference with /live/ proxy)
    location ~* ^/assets/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
